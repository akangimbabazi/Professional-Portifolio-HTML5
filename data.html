<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Price List</title>
</head>
<style>
    body {
    font-family: Arial;
    background: #eef2f7;
}

header {
    background: #673ab7;
    color: white;
    text-align: center;
    padding: 20px;
}

table {
    width: 80%;
    margin: 30px auto;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 12px;
    border: 1px solid #ddd;
    text-align: center;
}

thead {
    background: #673ab7;
    color: white;
}

tbody tr:hover {
    background: #f1f1f1;
}

tfoot {
    background: #ddd;
}
</style>
<body>

<header>
    <h1>Product Price List</h1>
</header>

<main>

<table border="1">
    <thead>
        <tr>
            <th scope="col">Product</th>
            <th scope="col">Category</th>
            <th scope="col">Price (UGX)</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>Smartphone</td>
            <td>Electronics</td>
            <td>800,000</td>
        </tr>
        <tr>
            <td>Sneakers</td>
            <td>Fashion</td>
            <td>120,000</td>
        </tr>
        <tr>
            <td>Headphones</td>
            <td>Electronics</td>
            <td>90,000</td>
        </tr>
        <tr>
            <td>racks</td>
            <td>appliances</td>
            <td>150000</td>
        </tr>
    </tbody>

    <tfoot>
        <tr>
            <td colspan="3">Prices subject to change</td>
        </tr>
    </tfoot>
</table>

</main>

</body>
</html>
