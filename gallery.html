<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery | Wildlife & Transport</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
/* style.css */
body { font-family: sans-serif; background: #f0f4f0; color: #333; margin: 0; }
header { background: #2e5a27; 
    color: white; 
    padding: 20px; 
    text-align: center; }
nav { background: #333; 
    padding: 10px; }

nav ul { display: flex; list-style: none; 
    justify-content: center; gap: 20px; margin: 0; }
nav a { color: white; text-decoration: none; font-weight: bold; }
main { max-width: 800px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
thead { background: #2e5a27; color: white; }
form { display: grid; gap: 10px; }
button { background: #2e5a27; color: white; padding: 10px; border: none; cursor: pointer; border-radius: 4px; }
figure img { max-width: 100%; border-radius: 5px; }
/* CARD CONTAINER */
.card {
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    cursor: pointer;
}

/* IMAGE */
.card img {
    width: 100 px;
    height: 345px;
    object-fit: cover;
    display: block;
}

/* FLOATING CARD (HIDDEN BY DEFAULT) */
.overlay {
    position: absolute;
    bottom: -100%; /* hidden below */
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    color: white;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    text-align: center;
    padding: 20px;

    transition: all 0.4s ease;
}

/* SHOW ON HOVER */
.card:hover .overlay {
    bottom: 0; /* slides up */
}

/* TEXT STYLE */
.overlay h3 {
    margin: 0;
    font-size: 20px;
}

.overlay p {
    font-size: 14px;
    margin-top: 10px;
}
</style>
<body>
    <header><h1>Media Gallery</h1></header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">Bio</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="data.html">Results</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    <main>
       <div class="gallery">
    <figure class="card">
        <img src="lion.jpg" alt="A pride of lions resting under a tree in the savanna">
        <div class="overlay">
            <h3>Lions</h3>
            <p>Lions of the Serengeti plains.</p>
        </div>
    </figure>

    <figure class="card">
        <img src="car.jpg" alt="A 4x4 safari vehicle navigating a river crossing">
        <div class="overlay">
            <h3>Safari Transport</h3>
            <p>Our rugged transport vehicles in action.</p>
        </div>
    </figure>

    <figure class="card">
        <img src="elephant.jpg" alt="An elephant mother and calf walking across the grass">
        <div class="overlay">
            <h3>Elephants</h3>
            <p>Conservation in motion.</p>
        </div>
    </figure>
</div>
        </section>
    </main>
    <footer><p>&copy; 2026 Professional Semantic Portfolio</p></footer>
</body>
</html>
